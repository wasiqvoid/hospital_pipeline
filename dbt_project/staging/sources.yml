version: 2

sources:
  - name: hospital_raw
    description: "OLTP source tables loaded by ingest_data.py"
    schema: public
    tables:

      - name: doctors
        description: "Hospital physicians"
        columns:
          - name: doctor_id
            tests: [unique, not_null]
          - name: email
            tests: [unique, not_null]
          - name: first_name
            tests: [not_null]
          - name: specialization
            tests:
              - not_null
              - accepted_values:
                  values: ['Dermatology','Pediatrics','Oncology']

      - name: patients
        description: "Registered patients"
        columns:
          - name: patient_id
            tests: [unique, not_null]
          - name: email
            tests: [unique, not_null]
          - name: first_name
            tests: [not_null]
          - name: gender
            tests:
              - accepted_values:
                  values: ['M','F','Other']

      - name: appointments
        description: "Scheduled patient-doctor visits"
        columns:
          - name: appointment_id
            tests: [unique, not_null]
          - name: patient_id
            tests:
              - not_null
              - relationships:
                  to: source('hospital_raw', 'patients')
                  field: patient_id
          - name: doctor_id
            tests:
              - not_null
              - relationships:
                  to: source('hospital_raw', 'doctors')
                  field: doctor_id
          - name: status
            tests:
              - accepted_values:
                  values: ['Scheduled','Completed','No-show','Cancelled']

      - name: treatments
        description: "Medical treatments per appointment"
        columns:
          - name: treatment_id
            tests: [unique, not_null]
          - name: appointment_id
            tests:
              - not_null
              - relationships:
                  to: source('hospital_raw', 'appointments')
                  field: appointment_id
          - name: treatment_type
            tests:
              - accepted_values:
                  values: ['Chemotherapy','MRI','ECG','Physiotherapy','X-Ray']
          - name: cost
            tests: [not_null]

      - name: billing
        description: "Financial billing records"
        columns:
          - name: bill_id
            tests: [unique, not_null]
          - name: patient_id
            tests:
              - not_null
              - relationships:
                  to: source('hospital_raw', 'patients')
                  field: patient_id
          - name: treatment_id
            tests:
              - not_null
              - relationships:
                  to: source('hospital_raw', 'treatments')
                  field: treatment_id
          - name: payment_status
            tests:
              - accepted_values:
                  values: ['Pending','Paid','Failed']
          - name: payment_method
            tests:
              - accepted_values:
                  values: ['Insurance','Credit Card','Cash']
          - name: amount
            tests: [not_null]
