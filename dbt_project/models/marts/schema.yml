version: 2

models:
  - name: dim_patient
    description: "Patient dimension with demographics and age groupings."
    columns:
      - name: patient_id
        tests: [unique, not_null]
      - name: full_name
        tests: [not_null]
      - name: gender
        tests:
          - accepted_values:
              values: ['M', 'F', 'Other']
      - name: age_group
        tests:
          - accepted_values:
              values: ['Pediatric', 'Young Adult', 'Middle Aged', 'Senior']
      - name: email
        tests: [unique, not_null]

  - name: dim_doctor
    description: "Doctor dimension with specialization and experience band."
    columns:
      - name: doctor_id
        tests: [unique, not_null]
      - name: full_name
        tests: [not_null]
      - name: specialization
        tests:
          - not_null
          - accepted_values:
              values: ['Dermatology', 'Pediatrics', 'Oncology']
      - name: experience_band
        tests:
          - accepted_values:
              values: ['Junior', 'Mid-Level', 'Senior']

  - name: dim_date
    description: "Date dimension covering 2023-2024."
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: full_date
        tests: [unique, not_null]
      - name: month
        tests:
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12

  - name: fact_appointments
    description: >
      Central fact table. Grain = one row per appointment.
      Contains treatment cost, billing amount, and status flags.
    columns:
      - name: appointment_id
        tests: [unique, not_null]
      - name: patient_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_patient')
              field: patient_id
      - name: doctor_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_doctor')
              field: doctor_id
      - name: treatment_cost
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: billed_amount
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
      - name: status
        tests:
          - accepted_values:
              values: ['Scheduled', 'Completed', 'No-show', 'Cancelled']
      - name: treatment_type
        tests:
          - accepted_values:
              values: ['Chemotherapy', 'MRI', 'ECG', 'Physiotherapy', 'X-Ray']
      - name: payment_status
        tests:
          - accepted_values:
              values: ['Pending', 'Paid', 'Failed', null]
      - name: payment_method
        tests:
          - accepted_values:
              values: ['Insurance', 'Credit Card', 'Cash', null]
